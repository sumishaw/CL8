name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Verify Flutter project root
        run: |
          if [ ! -f pubspec.yaml ]; then
            echo "ERROR: pubspec.yaml not found in repo root."
            exit 1
          fi
          echo "pubspec.yaml found at repo root"
          grep "^name:\|^version:" pubspec.yaml

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install Android NDK
        run: |
          NDK_DIR="$ANDROID_HOME/ndk/27.0.12077973"
          if [ -d "$NDK_DIR" ] && [ ! -f "$NDK_DIR/source.properties" ]; then
            echo "Removing incomplete NDK"
            rm -rf "$NDK_DIR"
          fi
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973"
          if [ -f "$NDK_DIR/source.properties" ]; then
            echo "NDK OK"; cat "$NDK_DIR/source.properties"
          else
            echo "NDK source.properties missing — build may fail"
          fi

      - name: Generate Gradle wrapper
        run: |
          cd android
          curl -sL https://services.gradle.org/distributions/gradle-8.9-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-install
          /tmp/gradle-install/gradle-8.9/bin/gradle wrapper --gradle-version 8.9 --distribution-type all
          chmod +x gradlew
          echo "gradlew generated successfully"

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Run tests
        run: flutter test
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release --no-shrink

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: caption-lens-v8-build${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
